# Runs at times that map to the configured America/New_York windows (handles EST/EDT).
# Gate: `lib/schedule/eastern.ts` — morning 09:00-10:00 ET, evening 16:00-18:00 ET.
# workflow_dispatch: optional force bypasses ET windows (still dedupes per day on manual slot).
name: Global News Pipeline Digest

permissions:
  contents: read
  actions: write # actions/cache restore/save for send-history.json

concurrency:
  group: global-news-digest-${{ github.repository }}
  cancel-in-progress: false

on:
  schedule:
    # Morning window 09:00-10:00 ET: 13:00/13:30 UTC in EDT, 14:00/14:30 UTC in EST.
    - cron: "0,30 13,14 * * *"
    # Evening window 16:00-18:00 ET: 20:00-21:30 UTC in EDT, 21:00-22:30 UTC in EST.
    - cron: "0,30 20,21,22 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "If true, ORCHESTRATE_MODE=force (bypass schedule windows). If false, same as cron (auto)."
        type: boolean
        default: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore send history cache
        uses: actions/cache/restore@v4
        id: send_cache
        with:
          path: data/send-history.json
          key: send-history-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            send-history-${{ github.repository }}-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Orchestrate (schedule gate + dedupe + pipeline + send)
        env:
          # Globo News 24 — topics pipeline only (regional mode retired)
          PIPELINE_MODE: topics
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MASTER_MODEL: ${{ vars.OPENAI_MASTER_MODEL || 'gpt-4o-mini' }}
          OPENAI_RANK_MODEL: ${{ vars.OPENAI_RANK_MODEL || 'gpt-4o-mini' }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ vars.REDDIT_USER_AGENT || 'GloboNews24/1.0 by Jordan14Ford' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Optional; default subject is set in sendDigest when unset
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT || 'Globo News 24' }}
          ORCHESTRATE_MODE: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.force_run == 'true' && 'force' || 'auto') || 'auto' }}
        run: npm run orchestrate

      - name: Save send history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/send-history.json
          key: send-history-${{ github.repository }}-${{ github.run_id }}
